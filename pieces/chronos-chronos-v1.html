  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {

              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};

      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });

    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {

      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);

  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {

    for (var i = 0; i < events.length; i++) {

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });

  window.addEventListener('unhandledrejection', function(event) {

    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHRONOS DIASPORA N</title>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  html,body{margin:0;height:100%;background:#000002;overflow:hidden;font-family:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace}
  canvas{display:block}
  #hud{position:absolute;top:22px;left:24px;color:#00ffaa;font-size:13px;line-height:1.7;letter-spacing:.3px;text-shadow:0 0 12px rgba(0,255,170,.65),0 0 2px rgba(0,255,170,.9);pointer-events:none;z-index:10;user-select:none}
  #hud .title{font-size:19px;font-weight:700;color:#b6ffe4;letter-spacing:2.5px;margin-bottom:10px;text-shadow:0 0 18px #00ffaa,0 0 4px #00ffaa}
  #hud .dim{opacity:.62}
  #hud .row{margin:2px 0}
  #hud .pulse{color:#7ffff0;animation:blink 1.8s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
  #panel{position:absolute;right:22px;bottom:22px;z-index:10;background:linear-gradient(180deg,rgba(3,12,18,.85),rgba(0,2,4,.75));border:1px solid rgba(0,255,170,.25);border-radius:14px;padding:14px 16px;width:240px;box-shadow:0 0 40px rgba(0,255,170,.12),inset 0 0 20px rgba(0,255,170,.06);backdrop-filter:blur(10px);color:#9fffe0}
  #panel .head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
  #panel .nlabel{font-size:12px;opacity:.75;letter-spacing:1px}
  #panel .nval{font-size:32px;color:#00ffaa;text-shadow:0 0 14px #00ffaa;font-weight:700;line-height:1}
  #slider{width:100%;appearance:none;height:4px;background:linear-gradient(90deg,rgba(0,255,170,.2),rgba(0,255,170,.8));border-radius:2px;outline:none;margin:12px 0 10px}
  #slider::-webkit-slider-thumb{appearance:none;width:16px;height:16px;border-radius:50%;background:#000;border:2px solid #00ffaa;box-shadow:0 0 10px #00ffaa;cursor:pointer}
  #formula{font-size:12px;color:#7ee6c6;display:flex;justify-content:space-between;align-items:center}
  #formula span{color:#00ffaa}
  #viz{margin-top:10px;height:36px;position:relative;overflow:hidden;border-radius:8px;background:rgba(0,255,170,.06);border:1px solid rgba(0,255,170,.12)}
  #viz i{position:absolute;top:50%;width:6px;height:6px;border-radius:50%;background:#00ffaa;transform:translate(-50%,-50%);box-shadow:0 0 8px #00ffaa;transition:left .3s ease}
  .hint{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);color:rgba(0,255,170,.55);font-size:11px;letter-spacing:1px;pointer-events:none;z-index:5}
  @media (max-width:640px){#hud{font-size:11px;top:14px;left:14px}#hud .title{font-size:15px}#panel{right:12px;bottom:12px;width:200px}}
</style>
</head>
<body>
<div id="hud">
  <div class="title">CHRONOS DIASPORA N</div>
  <div class="row">SYSTEM: n=<span id="nval">1</span>, n = -n:1:n</div>
  <div class="row">TOPH COUNT: <span id="tophCount">1</span> <span class="dim">[2n-1]</span></div>
  <div class="row">ACTIVE LAYERS: <span id="layers">0</span></div>
  <div class="row dim">321 -+ 0 : =1</div>
  <div class="row">IE1 / IE2 NODES: <span class="pulse">traversing</span></div>
  <div class="row dim">[Press 1-5 to set n]</div>
</div>

<div id="panel">
  <div class="head">
    <div class="nlabel">SYMMETRIC LAYERS</div>
    <div class="nval" id="nbig">1</div>
  </div>
  <input id="slider" type="range" min="1" max="5" step="1" value="1">
  <div id="formula">
    <div>n = <span id="fmin">0</span> :1: <span id="fmax">0</span></div>
    <div><span id="fcount">1</span> toph</div>
  </div>
  <div id="viz"></div>
</div>
<div class="hint">drag to orbit • scroll to zoom</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000002);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 5000);
camera.position.set(0, 28, 92);

const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.8));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.35;
controls.minDistance = 30;
controls.maxDistance = 300;

// post
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.85, 0.14);
composer.addPass(bloom);

// lights
scene.add(new THREE.AmbientLight(0x0a0a1a, 0.7));
const lights = [
  [0x00ffaa, 30, 20, 30],
  [0xff3366, -30, -18, 28],
  [0x3399ff, -28, 22, -30],
  [0xffaa00, 26, -20, -26],
];
lights.forEach(([c,x,y,z])=>{
  const l = new THREE.PointLight(c, 180, 400, 1.8);
  l.position.set(x,y,z);
  scene.add(l);
});

// starfield
{
  const g = new THREE.BufferGeometry();
  const N=12000, arr=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const r=6000*Math.random()+200;
    const th=Math.random()*Math.PI*2;
    const ph=Math.acos((Math.random()*2-1));
    arr[i*3]=r*Math.sin(ph)*Math.cos(th);
    arr[i*3+1]=r*Math.cos(ph)*0.6;
    arr[i*3+2]=r*Math.sin(ph)*Math.sin(th);
  }
  g.setAttribute('position', new THREE.BufferAttribute(arr,3));
  const m = new THREE.PointsMaterial({color:0x9ecfff,size:1.2,transparent:true,opacity:.78,sizeAttenuation:true});
  scene.add(new THREE.Points(g,m));
}

// groups
const tophGroup = new THREE.Group();
scene.add(tophGroup);
const nodeGroup = new THREE.Group();
scene.add(nodeGroup);

// central singularity
const coreGroup = new THREE.Group();
{
  const coreMat = new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x77ddff,emissiveIntensity:2.2,metalness:.6,roughness:.15});
  const core = new THREE.Mesh(new THREE.SphereGeometry(2.5,64,64), coreMat);
  const corona = new THREE.Mesh(new THREE.SphereGeometry(4.7,64,64), new THREE.MeshBasicMaterial({color:0x39bfff,transparent:true,opacity:.14,blending:THREE.AdditiveBlending,side:THREE.BackSide}));
  const halo = new THREE.Mesh(new THREE.SphereGeometry(7.2,64,64), new THREE.MeshBasicMaterial({color:0x00ffaa,transparent:true,opacity:.06,blending:THREE.AdditiveBlending,side:THREE.BackSide}));
  coreGroup.add(core, corona, halo);
  coreGroup.userData = {core, corona, halo};
}
scene.add(coreGroup);

// IE nodes
const ie1 = new THREE.Mesh(new THREE.SphereGeometry(0.9,32,32), new THREE.MeshStandardMaterial({color:0x00ffaa,emissive:0x00ffaa,emissiveIntensity:3.2}));
const ie2 = new THREE.Mesh(new THREE.SphereGeometry(0.9,32,32), new THREE.MeshStandardMaterial({color:0xff55aa,emissive:0xff3366,emissiveIntensity:3.0}));
nodeGroup.add(ie1, ie2);
const l1 = new THREE.PointLight(0x00ffaa, 35, 50); nodeGroup.add(l1);
const l2 = new THREE.PointLight(0xff3366, 35, 50); nodeGroup.add(l2);

function makeTrail(col){
  const N=200, arr=new Float32Array(N*3);
  const g=new THREE.BufferGeometry(); g.setAttribute('position', new THREE.BufferAttribute(arr,3));
  const m=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:.72});
  const line=new THREE.Line(g,m); line.frustumCulled=false; return line;
}
const trail1 = makeTrail(0x00ffaa); const trail2 = makeTrail(0xff6699);
nodeGroup.add(trail1, trail2);

function updateTrail(line, pos){
  const a=line.geometry.attributes.position.array;
  for(let i=a.length-3;i>=3;i--){a[i]=a[i-3];a[i+1]=a[i-2];a[i+2]=a[i-1]}
  a[0]=pos.x;a[1]=pos.y;a[2]=pos.z;
  line.geometry.attributes.position.needsUpdate=true;
}

// cache
const geoCache = new Map();
function getGeo(r,t){
  const k=r.toFixed(2)+'_'+t.toFixed(2);
  if(!geoCache.has(k)) geoCache.set(k, new THREE.TorusGeometry(r,t,80,160));
  return geoCache.get(k);
}

const torusDefs = [
  {col:0x00ffaa, rx:0, ry:0, rz:0},          // IE1-Alpha
  {col:0xff3366, rx:0, ry:0, rz:Math.PI/2},  // IE1-Beta
  {col:0x3399ff, rx:Math.PI/2, ry:0, rz:0},  // IE2-Alpha
  {col:0xffaa00, rx:0.3, ry:Math.PI/2, rz:0} // IE2-Beta
];

let n=1;
let tophs=[];
let pulsePhase=0;

function clearTophs(){
  tophs.forEach(t=>{
    t.toroids.forEach(m=>{m.material.dispose();});
    t.group.removeFromParent();
  });
  tophs=[];
  tophGroup.clear();
}

function buildSystem(newN){
  n=newN;
  clearTophs();
  for(let i=-(n-1); i<=n-1; i++){
    const abs = Math.abs(i);
    const baseScale = 1 + abs*0.65;
    const radius = 12 * baseScale;
    const tube = 3.2 * Math.pow(baseScale, 0.7);
    const geo = getGeo(radius, tube);
    const g = new THREE.Group();
    g.position.y = i * 4;
    g.userData = {i, radius, dir: i>=0?1:-1, baseScale};

    const toroids=[]; const mats=[];
    torusDefs.forEach((def, idx)=>{
      let col = new THREE.Color(def.col);
      const mat = new THREE.MeshStandardMaterial({
        color: col,
        emissive: col.clone(),
        emissiveIntensity: i<0?1.12:1.4,
        metalness:0.28,
        roughness:0.22,
        transparent:true,
        opacity:0.92,
        side:THREE.DoubleSide
      });
      if(i<0){ mat.color.offsetHSL(0.035, -0.07, -0.04); mat.emissive.copy(mat.color); }
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.set(def.rx, def.ry, def.rz);
      // inner core
      const inner = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:def.col,transparent:true,opacity:0.12,blending:THREE.AdditiveBlending,depthWrite:false}));
      inner.scale.setScalar(0.7);
      mesh.add(inner);
      g.add(mesh);
      toroids.push(mesh); mats.push(mat);
    });

    tophGroup.add(g);
    tophs.push({group:g, toroids, materials:mats, i, radius});
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById('nval').textContent = n;
  document.getElementById('nbig').textContent = n;
  document.getElementById('tophCount').textContent = (2*n-1);
  document.getElementById('fcount').textContent = (2*n-1);
  document.getElementById('fmin').textContent = -(n-1);
  document.getElementById('fmax').textContent = (n-1);
  const layers = [];
  for(let i=-(n-1); i<=n-1; i++) layers.push(i>0?`+${i}`:`${i}`);
  document.getElementById('layers').textContent = layers.join(' ');
  document.getElementById('slider').value = n;
  // viz dots
  const viz = document.getElementById('viz'); viz.innerHTML='';
  const count = 2*n-1;
  for(let k=0;k<count;k++){
    const i = k-(n-1);
    const d=document.createElement('i');
    const pct = 10 + (k/(count-1||1))*80;
    d.style.left = pct+'%';
    d.style.opacity = i===0? '1' : 0.55 + 0.45*(1-Math.abs(i)/(n));
    d.style.transform = `translate(-50%,-50%) scale(${i===0?1.35:1})`;
    viz.appendChild(d);
  }
}

function setN(v){ if(v===n) return; buildSystem(v); }

// initial
buildSystem(1);

// animate
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  pulsePhase += 0.011;

  // tophs animation
  tophs.forEach(th=>{
    const i = th.i;
    const offset = i*0.8;
    const scalePulse = 1 + Math.sin(pulsePhase*3 + offset)*0.05;
    th.group.scale.setScalar(scalePulse);
    const dir = th.group.userData.dir;
    th.toroids[0].rotation.z += 0.0030 * dir;
    th.toroids[1].rotation.x += 0.0032 * dir;
    th.toroids[2].rotation.y += 0.0029 * dir;
    th.toroids[3].rotation.z -= 0.0034 * dir;

    let baseEmit = 1.4 + Math.sin(pulsePhase*5 + offset)*0.4;
    if(i<0) baseEmit *= 0.8;

    const dist1 = ie1.position.distanceTo(th.group.position);
    const dist2 = ie2.position.distanceTo(th.group.position);
    const near = Math.min(dist1,dist2) < th.radius*0.85 ? 0.65 : 0;

    th.materials.forEach(m=> m.emissiveIntensity = baseEmit + near);
    // subtle group tilt
    th.group.rotation.y = Math.sin(pulsePhase*0.4 + offset*0.5)*0.06*dir;
  });

  // nodes path
  const scaleN = 1 + (n-1)*0.55;
  const ampY = (n-1)*6;
  ie1.position.set(
    22 * Math.sin(t*0.6) * scaleN,
    ampY * Math.sin(t*0.3),
    18 * Math.cos(t*0.6) * scaleN
  );
  ie2.position.set(
    22 * Math.sin(t*0.6 + Math.PI) * scaleN,
    ampY * Math.sin(t*0.3 + Math.PI),
    18 * Math.cos(t*0.6 + Math.PI) * scaleN
  );
  l1.position.copy(ie1.position); l2.position.copy(ie2.position);
  updateTrail(trail1, ie1.position);
  updateTrail(trail2, ie2.position);

  // core pulse
  const {core, corona, halo} = coreGroup.userData;
  const cp = 1 + Math.sin(pulsePhase*2)*0.07;
  core.scale.setScalar(cp);
  corona.scale.setScalar(1.18 + Math.sin(pulsePhase*1.5)*0.11);
  halo.scale.setScalar(1.35 + Math.sin(pulsePhase*1.1)*0.08);
  core.material.emissiveIntensity = 2.1 + Math.sin(pulsePhase*4)*0.45;
  coreGroup.rotation.y += 0.0015;

  controls.update();
  composer.render();
}
animate();

// interactions
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
document.getElementById('slider').addEventListener('input', e=> setN(parseInt(e.target.value)));
window.addEventListener('keydown', e=>{
  const k = e.key;
  if(k>='1' && k<='5') setN(parseInt(k));
  if(k==='ArrowUp') setN(Math.min(5,n+1));
  if(k==='ArrowDown') setN(Math.max(1,n-1));
});
</script>
</body>
</html>
