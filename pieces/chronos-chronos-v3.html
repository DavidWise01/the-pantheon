<script>// Playables SDK v1.0.0

(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CHRONOS v2 — The Living Toroid</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden; background:#000;
    font-family:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    cursor: crosshair;
  }
  canvas { display:block; position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; }
  body::after {
    content:''; position:fixed; inset:0; z-index:3; pointer-events:none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.9) 100%);
  }
  .scanlines {
    position:fixed; inset:0; z-index:4; pointer-events:none;
    background: repeating-linear-gradient(0deg, rgba(0,255,170,0.04) 0px, transparent 1px, transparent 3px);
    mix-blend-mode: screen; opacity:0.4;
  }
  .hud {
    position:fixed; top:20px; left:20px; z-index:10;
    background: rgba(0,5,3,0.72);
    border:1px solid rgba(0,255,170,0.35);
    border-left: 2px solid #00ffaa;
    padding:16px 20px 14px;
    min-width:280px;
    color:#00ffaa;
    font-size:12px; line-height:1.75; letter-spacing:0.3px;
    backdrop-filter: blur(10px) saturate(1.2);
    box-shadow: 0 0 40px rgba(0,255,136,0.12), inset 0 0 30px rgba(0,255,136,0.03);
    text-shadow: 0 0 10px rgba(0,255,170,0.5);
    border-radius:2px;
    animation: hudFlicker 8s infinite;
  }
  @keyframes hudFlicker {
    0%,100%{opacity:1} 97%{opacity:1} 98%{opacity:0.9} 99%{opacity:1}
  }
  .hud::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, #00ffaa, transparent);
    opacity:0.7;
  }
  .hud-title {
    color:#7affd6; font-weight:600; font-size:11px; text-transform:uppercase;
    letter-spacing:1.8px; margin-bottom:10px; opacity:0.9;
  }
  .hud-row { display:flex; gap:8px; align-items:baseline; }
  .hud-label { opacity:0.7; }
  .hud-value { color:#aaffee; }
  .status-dot {
    width:7px; height:7px; border-radius:50%; background:#00ff88;
    box-shadow:0 0 10px #00ff88, 0 0 20px #00ff88; animation: breathe 2.1s ease-in-out infinite;
    display:inline-block; margin-right:6px;
  }
  @keyframes breathe {0%,100%{transform:scale(1);opacity:1}50%{transform:scale(0.85);opacity:0.6}}
  .pulse-val { color:#ff66aa; text-shadow:0 0 12px rgba(255,51,102,0.7); font-weight:600; }
  .divider { height:1px; background:linear-gradient(90deg, transparent, rgba(0,255,170,0.3), transparent); margin:8px 0; }
  .bottom-text {
    position:fixed; bottom:4vh; left:50%; transform:translateX(-50%); z-index:5;
    font-size:clamp(26px, 8vw, 96px); font-weight:600;
    color:#00ffaa; letter-spacing:0.22em; white-space:nowrap;
    opacity:0.055; pointer-events:none; user-select:none;
    text-shadow:0 0 60px rgba(0,255,170,0.5);
    font-family:'JetBrains Mono', monospace;
  }
  .corner {
    position:fixed; width:12px; height:12px; border-color:#00ffaa; opacity:0.5; z-index:11; pointer-events:none;
  }
  .tl { top:20px; left:20px; border-top:1px solid; border-left:1px solid; }
  .tr { top:20px; right:20px; border-top:1px solid; border-right:1px solid; }
  .bl { bottom:20px; left:20px; border-bottom:1px solid; border-left:1px solid; }
  .br { bottom:20px; right:20px; border-bottom:1px solid; border-right:1px solid; }
  @media (max-width:600px){
    .hud{ top:12px; left:12px; right:12px; min-width:auto; font-size:11px; padding:12px 14px; }
    .bottom-text{ font-size:clamp(18px,10vw,48px); bottom:6vh; }
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div class="scanlines"></div>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

<div class="hud">
  <div class="hud-title">CHRONOS v2.0 — 3-2-1 : 0-+ Pulse</div>
  <div class="hud-row"><span class="hud-label">321 -+ 0 : =1</span></div>
  <div class="divider"></div>
  <div class="hud-row"><span class="status-dot"></span><span>5/5 Balanced • Homeostasis Active</span></div>
  <div class="hud-row"><span class="hud-label">Single Polaroid (Node 15) • 3002 Body</span></div>
  <div class="divider"></div>
  <div class="hud-row"><span class="hud-label">Pulse:</span> <span class="pulse-val" id="pulseVal">0.000</span> <span class="hud-label" style="margin-left:8px">Phase:</span> <span class="hud-value" id="phaseVal">0.00</span></div>
</div>

<div class="bottom-text">321 -+ 0 : =1</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.018);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.set(0, 1.5, 15);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.rotateSpeed = 0.6;
controls.minDistance = 8;
controls.maxDistance = 28;
controls.autoRotate = false;
controls.enablePan = false;

// STARFIELD
const starCount = 2000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount*3);
const starCol = new Float32Array(starCount*3);
for(let i=0;i<starCount;i++){
  const r = 80 + Math.random()*80;
  const theta = Math.random()*Math.PI*2;
  const phi = Math.acos(2*Math.random()-1);
  const x = r*Math.sin(phi)*Math.cos(theta);
  const y = r*Math.sin(phi)*Math.sin(theta);
  const z = r*Math.cos(phi);
  starPos.set([x,y,z], i*3);
  const c = 0.5 + Math.random()*0.5;
  starCol.set([0.0*c, 1.0*c, 0.7*c], i*3);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
starGeo.setAttribute('color', new THREE.BufferAttribute(starCol,3));
const starMat = new THREE.PointsMaterial({ size:0.06, vertexColors:true, transparent:true, opacity:0.8, blending:THREE.AdditiveBlending, depthWrite:false });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// LIGHTS
scene.add(new THREE.AmbientLight(0x222222, 0.9));
const pointLight = new THREE.PointLight(0x00ffaa, 2.5, 60, 2);
pointLight.position.set(10,5,10);
scene.add(pointLight);

// TOROID GROUP
const toroid = new THREE.Group();
scene.add(toroid);

const outerMat = new THREE.MeshPhysicalMaterial({
  color: 0x00ffaa,
  emissive: 0x00ff88,
  emissiveIntensity: 1.5,
  roughness: 0.15,
  metalness: 0.7,
  clearcoat: 1.0,
  clearcoatRoughness: 0.08,
  transmission: 0.2,
  ior: 1.4,
  thickness: 0.5,
  side: THREE.DoubleSide
});

const innerMat = new THREE.MeshPhysicalMaterial({
  color: 0x00ffaa,
  emissive: 0x00ff88,
  emissiveIntensity: 1.0,
  roughness: 0.2,
  metalness: 0.5,
  transparent: true,
  opacity: 0.25,
  side: THREE.DoubleSide,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});

const torusGeoOuter = new THREE.TorusGeometry(5, 1.8, 64, 128);
const torusGeoInner = new THREE.TorusGeometry(5, 1.6, 64, 128);

const outerTorus = new THREE.Mesh(torusGeoOuter, outerMat);
const innerTorus = new THREE.Mesh(torusGeoInner, innerMat);
toroid.add(outerTorus, innerTorus);

// NODE 15
const nodeMat = new THREE.MeshBasicMaterial({ color:0xff3366, transparent:true, opacity:0.95 });
const node = new THREE.Mesh(new THREE.SphereGeometry(0.22, 24, 24), nodeMat);
const nodeGlow = new THREE.PointLight(0xff3366, 3.5, 6, 2);
node.add(nodeGlow);
toroid.add(node);

// subtle core ring
const coreRing = new THREE.Mesh(
  new THREE.TorusGeometry(5, 0.05, 16, 256),
  new THREE.MeshBasicMaterial({ color:0x00ffaa, transparent:true, opacity:0.4, blending:THREE.AdditiveBlending })
);
toroid.add(coreRing);

// POST PROCESSING
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.3, 0.85, 0.15);
composer.addPass(bloomPass);

// ANIMATION
let pulsePhase = 0;
const pulseEl = document.getElementById('pulseVal');
const phaseEl = document.getElementById('phaseVal');

function animate(){
  requestAnimationFrame(animate);
  
  pulsePhase += 0.015;
  
  // 3-2-1 contraction
  const scale = 1 + Math.sin(pulsePhase * 3) * 0.08;
  toroid.scale.setScalar(scale);
  
  toroid.rotation.x = Math.sin(pulsePhase) * 0.3;
  toroid.rotation.y = pulsePhase * 0.4;
  toroid.rotation.z = Math.sin(pulsePhase*0.7) * 0.1;
  
  // 0-+ breath
  const emissiveIntensity = 1.2 + Math.sin(pulsePhase * 5) * 0.4;
  outerMat.emissiveIntensity = emissiveIntensity;
  innerMat.emissiveIntensity = emissiveIntensity * 0.6;
  innerMat.opacity = 0.22 + Math.sin(pulsePhase*4)*0.05;
  
  // Node 15 travel
  const R = 5, r = 1.8;
  const u = pulsePhase * 0.5;
  const v = pulsePhase * 2.3;
  const nx = (R + r * Math.cos(v)) * Math.cos(u);
  const ny = (R + r * Math.cos(v)) * Math.sin(u);
  const nz = r * Math.sin(v);
  node.position.set(nx, ny, nz);
  
  const nodeScale = 1 + Math.sin(pulsePhase*8)*0.25;
  node.scale.setScalar(nodeScale);
  nodeMat.opacity = 0.75 + Math.sin(pulsePhase*5)*0.2;
  nodeGlow.intensity = 2.5 + Math.sin(pulsePhase*6)*1.0;
  
  // moving light
  pointLight.position.x = Math.cos(pulsePhase*0.7) * 12;
  pointLight.position.y = Math.sin(pulsePhase*0.5) * 7;
  pointLight.position.z = Math.sin(pulsePhase*0.7) * 12;
  pointLight.intensity = 2.2 + Math.sin(pulsePhase*3)*0.6;
  
  // stars drift
  stars.rotation.y += 0.00015;
  stars.rotation.x += 0.00003;
  
  // inner counter-rotate
  innerTorus.rotation.z = -pulsePhase * 0.5;
  coreRing.rotation.x = pulsePhase * 0.3;
  
  controls.update();
  composer.render();
  
  // HUD live values
  const pulseValue = (Math.sin(pulsePhase*5)*0.5 + 0.5);
  pulseEl.textContent = pulseValue.toFixed(3);
  phaseEl.textContent = (pulsePhase % (Math.PI*2)).toFixed(2);
  pulseEl.style.opacity = 0.7 + pulseValue*0.3;
}

animate();

// RESIZE
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// Interaction hint - subtle auto nudge
let idle = 0;
renderer.domElement.addEventListener('pointerdown', ()=> idle = 0);
setInterval(()=>{ idle++; if(idle>5 && !controls.autoRotate){ toroid.rotation.y += 0.001; }}, 1000);
</script>
</body>
</html>
