  var firstInteractionSent = false;

  if (originalRAF) {

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.0035);

const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 3000);
camera.position.set(0,4,10);

const renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 3;
controls.maxDistance = 180;
controls.autoRotateSpeed = 0.15;

scene.add(new THREE.AmbientLight(0x101820, 0.6));
const pLight = new THREE.PointLight(0x00ffff, 2, 200);
scene.add(pLight);

// STARS
const starGeo = new THREE.BufferGeometry();
const starCount = 25000;
const starPos = new Float32Array(starCount*3);
for(let i=0;i<starCount;i++){
  const r = 800 + Math.random()*1200;
  const th = Math.random()*Math.PI*2;
  const ph = Math.acos((Math.random()*2-1));
  starPos[i*3] = r*Math.sin(ph)*Math.cos(th);
  starPos[i*3+1] = r*Math.cos(ph)*0.6;
  starPos[i*3+2] = r*Math.sin(ph)*Math.sin(th);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0x88aaff,size:0.7,sizeAttenuation:true,transparent:true,opacity:0.6})));

// === LAYER 1: PULSAR ===
const pulsar = new THREE.Group();
scene.add(pulsar);

const coreMat = new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x66ddff,emissiveIntensity:2.5,roughness:0.2,metalness:0.9});
const core = new THREE.Mesh(new THREE.SphereGeometry(0.8,32,32), coreMat);
pulsar.add(core);
const glow = new THREE.Mesh(new THREE.SphereGeometry(2.2,32,32), new THREE.MeshBasicMaterial({color:0x00eeff,transparent:true,opacity:0.07,blending:THREE.AdditiveBlending,side:THREE.BackSide}));
pulsar.add(glow);

const beams = new THREE.Group();
const beamMat = new THREE.MeshBasicMaterial({color:0x00ffff,transparent:true,opacity:0.85,blending:THREE.AdditiveBlending,depthWrite:false});
const b1 = new THREE.Mesh(new THREE.ConeGeometry(1.4,70,32,1,true), beamMat);
b1.position.y = 35; b1.rotation.x = -Math.PI/2;
const b2 = new THREE.Mesh(new THREE.ConeGeometry(1.4,70,32,1,true), beamMat.clone());
b2.material.color.set(0xff66ff); b2.position.y = -35; b2.rotation.x = Math.PI/2;
beams.add(b1,b2);
scene.add(beams);

// JETS
const jetCount = 3000;
const jetGeo = new THREE.BufferGeometry();
const jPos = new Float32Array(jetCount*3);
const jVel = new Float32Array(jetCount*3);
for(let i=0;i<jetCount;i++){
  const side = i<jetCount/2?1:-1;
  const a = Math.random()*Math.PI*2;
  const r = Math.pow(Math.random(),2)*0.4;
  jPos[i*3] = Math.cos(a)*r;
  jPos[i*3+1] = side*(Math.random()*2);
  jPos[i*3+2] = Math.sin(a)*r;
  jVel[i*3] = (Math.random()-0.5)*0.1;
  jVel[i*3+1] = side*(2+Math.random()*3);
  jVel[i*3+2] = (Math.random()-0.5)*0.1;
}
jetGeo.setAttribute('position', new THREE.BufferAttribute(jPos,3));
const jets = new THREE.Points(jetGeo, new THREE.PointsMaterial({color:0xaaffff,size:0.25,transparent:true,opacity:0.85,blending:THREE.AdditiveBlending,depthWrite:false}));
scene.add(jets);

// EMP RINGS
const rings = [];
const ringMat = new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.9,side:THREE.DoubleSide,blending:THREE.AdditiveBlending});
function spawnEMP(){
  const mesh = new THREE.Mesh(new THREE.RingGeometry(0.5,1.2,128), ringMat.clone());
  mesh.rotation.x = Math.PI/2;
  scene.add(mesh);
  rings.push({mesh, r:0, life:0});
}
setInterval(spawnEMP, 2100);
spawnEMP();

// === LAYER 2: BASE TOPHS ===
const COLORS = [new THREE.Color(0x00ffff), new THREE.Color(0xff00ff), new THREE.Color(0x3399ff), new THREE.Color(0xffaa00)];
const baseGroups = [];
const parentToroids = [];
const torusR = 4.8, torusTube = 0.44;
const baseTorusGeo = new THREE.TorusGeometry(torusR, torusTube, 18, 96);

for(let b=0;b<2;b++){
  const g = new THREE.Group();
  g.userData.speed = b===0?0.004:-0.0051;
  scene.add(g);
  baseGroups.push(g);
  for(let t=0;t<4;t++){
    const mat = new THREE.MeshStandardMaterial({color:COLORS[t],emissive:COLORS[t],emissiveIntensity:1.1,roughness:0.3,metalness:0.7,transparent:true,opacity:0.96});
    const mesh = new THREE.Mesh(baseTorusGeo, mat);
    const e = new THREE.Euler(t*Math.PI/2.1, b*Math.PI*0.5, t*1.3);
    mesh.quaternion.setFromEuler(e);
    g.add(mesh);
    parentToroids.push({base:b, color:COLORS[t].clone(), localQuat:mesh.quaternion.clone(), group:g});
  }
}

// CHILD TOPHS (96)
const childGeoms=[];
for(let i=0;i<4;i++){
  const g = new THREE.TorusGeometry(0.9,0.18,12,28);
  const m = new THREE.Matrix4();
  if(i===1) m.makeRotationX(Math.PI/2);
  if(i===2) m.makeRotationY(Math.PI/2);
  if(i===3) m.makeRotationZ(Math.PI/2);
  g.applyMatrix4(m);
  childGeoms.push(g);
}
const childGeom = BufferGeometryUtils.mergeGeometries(childGeoms);
const childMat = new THREE.MeshBasicMaterial({vertexColors:true,transparent:true,opacity:0.92,blending:THREE.AdditiveBlending});
const childInst = new THREE.InstancedMesh(childGeom, childMat, 96);
childInst.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
childInst.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(96*3),3);
scene.add(childInst);

const childData=[];
let ci=0;
parentToroids.forEach((p,pi)=>{
  for(let j=0;j<12;j++){
    const col = p.color.clone().multiplyScalar(1.25);
    childData.push({parent:pi, angle:j*Math.PI*2/12, phase:j*0.7+Math.random(), color:col});
    childInst.setColorAt(ci++, col);
  }
});

// GRANDCHILDREN (576)
const grandGeom = new THREE.TorusGeometry(0.35,0.07,10,20);
const grandMat = new THREE.MeshBasicMaterial({vertexColors:true,transparent:true,opacity:0.62,blending:THREE.AdditiveBlending,depthWrite:false});
const grandInst = new THREE.InstancedMesh(grandGeom, grandMat, 576);
grandInst.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
grandInst.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(576*3),3);
scene.add(grandInst);

const grandData=[];
const grandBloom = new Float32Array(576);
for(let c=0;c<96;c++){
  const bc = childData[c].color;
  for(let k=0;k<6;k++){
    const col = bc.clone().offsetHSL((Math.random()-0.5)*0.08,0.05,0.12);
    grandData.push({child:c, angle:k*Math.PI*2/6, phase:Math.random()*6.28, color:col});
    grandInst.setColorAt(c*6+k, col);
  }
}

// === LAYER 3: DIASPORA WEB ===
const connections=[];
for(let i=0;i<96;i++) connections.push({t:'pc', a:0, b:i});
parentToroids.forEach((p,pi)=>{
  for(let j=0;j<12;j++){
    const a = pi*12+j;
    const b1 = pi*12+((j+1)%12);
    const b2 = pi*12+((j+3)%12);
    connections.push({t:'cc',a,b:b1});
    if(j%2===0) connections.push({t:'cc',a,b:b2});
  }
});
grandData.forEach((g,i)=> connections.push({t:'cg', a:g.child, b:i}));

const totalLines = connections.length;
const webPos = new Float32Array(totalLines*2*3);
const webCol = new Float32Array(totalLines*2*3);
const webGeo = new THREE.BufferGeometry();
webGeo.setAttribute('position', new THREE.BufferAttribute(webPos,3));
webGeo.setAttribute('color', new THREE.BufferAttribute(webCol,3));
const web = new THREE.LineSegments(webGeo, new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.55,blending:THREE.AdditiveBlending,depthWrite:false}));
scene.add(web);

// ADJACENCY FOR AGENTS
const NODE_COUNT = 1+96+576;
const adj = Array.from({length:NODE_COUNT},()=>[]);
connections.forEach(c=>{
  let a,b;
  if(c.t==='pc'){a=0; b=1+c.b;}
  else if(c.t==='cc'){a=1+c.a; b=1+c.b;}
  else {a=1+c.a; b=1+96+c.b;}
  adj[a].push(b); adj[b].push(a);
});

// IE1 IE2
function makeAgent(col){
  const m = new THREE.Mesh(new THREE.SphereGeometry(0.18,16,16), new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.95,blending:THREE.AdditiveBlending}));
  scene.add(m);
  const trailGeo = new THREE.BufferGeometry();
  const trailPos = new Float32Array(200*3);
  trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos,3));
  const trail = new THREE.Line(trailGeo, new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.4,blending:THREE.AdditiveBlending}));
  scene.add(trail);
  return {mesh:m, trail, trailPos, node:0, target:1, prog:0, speed:12+Math.random()*4};
}
const agents = [makeAgent(0x00ffff), makeAgent(0xff66ff)];

const dummy = new THREE.Object3D();
const childPosArr = Array(96);
const grandPosArr = Array(576);
const waves = [];

const clock = new THREE.Clock();
let fps=60, frames=0, last=performance.now();

function animate(){
  const t = clock.getElapsedTime();
  const dt = Math.min(clock.getDelta(),0.033);
  frames++; 
  if(performance.now()-last>500){fps=Math.round(frames*1000/(performance.now()-last));frames=0;last=performance.now();document.getElementById('perf').textContent=`FPS ${fps} | PULSAR 48Hz`;}

  // PULSAR
  coreMat.emissiveIntensity = 2.2 + Math.sin(t*48*Math.PI*2)*0.8;
  glow.material.opacity = 0.06 + Math.sin(t*10)*0.02;
  beams.rotation.y += dt*7.2;
  b1.material.opacity = 0.65 + Math.sin(t*30)*0.25;
  b2.material.opacity = 0.65 + Math.cos(t*30)*0.25;
  pLight.intensity = 1.5 + Math.sin(t*48*6.28)*0.5;

  // JETS
  const jp = jets.geometry.attributes.position.array;
  for(let i=0;i<jetCount;i++){
    jp[i*3]+=jVel[i*3]*dt*5;
    jp[i*3+1]+=jVel[i*3+1]*dt;
    jp[i*3+2]+=jVel[i*3+2]*dt;
    if(Math.abs(jp[i*3+1])>65){
      const side=Math.sign(jVel[i*3+1]);
      jp[i*3]=(Math.random()-0.5)*0.8;
      jp[i*3+1]=side*1.5;
      jp[i*3+2]=(Math.random()-0.5)*0.8;
    }
  }
  jets.geometry.attributes.position.needsUpdate=true;

  // RINGS & WAVES
  rings.forEach((r,i)=>{
    r.r += dt*24;
    r.life+=dt;
    r.mesh.scale.setScalar(r.r*0.9);
    r.mesh.material.opacity = Math.max(0,0.8 - r.r/70);
    if(r.r>2 && !r.wave){waves.push({r:0}); r.wave=true;}
    if(r.r>85){scene.remove(r.mesh); rings.splice(i,1);}
  });
  waves.forEach((w,i)=>{w.r+=dt*26; if(w.r>110) waves.splice(i,1)});

  // BASE BREATH
  const pulse = t*0.7;
  const baseBreath = 1 + Math.sin(pulse*3)*0.06;
  baseGroups[0].rotation.y += 0.004;
  baseGroups[0].rotation.x += 0.0017;
  baseGroups[1].rotation.y -= 0.0053;
  baseGroups[1].rotation.x -= 0.0021;
  baseGroups.forEach(g=>g.scale.setScalar(baseBreath));

  // CHILDREN
  for(let i=0;i<96;i++){
    const d = childData[i];
    const parent = parentToroids[d.parent];
    const pq = parent.group.quaternion.clone().multiply(parent.localQuat);
    const ang = d.angle + t*0.36;
    const local = new THREE.Vector3(Math.cos(ang)*torusR, Math.sin(ang)*torusR, 0).applyQuaternion(pq).multiplyScalar(baseBreath);
    const breath = 1 + Math.sin(pulse*3 + d.phase)*0.12;
    const s = 0.18*breath;
    const cq = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0.3), t*1.2 + d.phase);
    dummy.position.copy(local);
    dummy.quaternion.copy(pq).multiply(cq);
    dummy.scale.setScalar(s);
    dummy.updateMatrix();
    childInst.setMatrixAt(i, dummy.matrix);
    childPosArr[i]={x:local.x,y:local.y,z:local.z,q:dummy.quaternion.clone(),s};
  }
  childInst.instanceMatrix.needsUpdate=true;

  // GRANDCHILDREN
  for(let i=0;i<576;i++){
    const g = grandData[i];
    const cp = childPosArr[g.child];
    const ang = g.angle + t*1.08;
    const off = new THREE.Vector3(Math.cos(ang)*0.85, Math.sin(ang)*0.85, Math.sin(ang*2)*0.2).multiplyScalar(cp.s*3.2).applyQuaternion(cp.q);
    const pos = new THREE.Vector3(cp.x+off.x, cp.y+off.y, cp.z+off.z);
    grandBloom[i] = Math.max(0, grandBloom[i]-dt*1.8);
    const breath = 1 + Math.sin(pulse*9 + g.phase)*0.2 + grandBloom[i]*2.5;
    const s = 0.063*breath;
    // LOD
    const dist = pos.distanceTo(camera.position);
    const vis = dist<85?1:Math.max(0,1-(dist-85)/30);
    dummy.position.copy(pos);
    dummy.quaternion.copy(cp.q);
    dummy.scale.setScalar(s*vis);
    dummy.updateMatrix();
    grandInst.setMatrixAt(i,dummy.matrix);
    grandPosArr[i]={x:pos.x,y:pos.y,z:pos.z,d:pos.length()};
  }
  grandInst.instanceMatrix.needsUpdate=true;

  // WEB
  let ptr=0;
  for(let i=0;i<totalLines;i++){
    const c = connections[i];
    let ax,ay,az,bx,by,bz,ca,cb;
    if(c.t==='pc'){ax=0;ay=0;az=0; ca=new THREE.Color(0x88ffff); const p=childPosArr[c.b]; bx=p.x;by=p.y;bz=p.z; cb=childData[c.b].color;}
    else if(c.t==='cc'){const pa=childPosArr[c.a], pb=childPosArr[c.b]; ax=pa.x;ay=pa.y;az=pa.z; bx=pb.x;by=pb.y;bz=pb.z; ca=childData[c.a].color; cb=childData[c.b].color;}
    else {const pa=childPosArr[c.a], pb=grandPosArr[c.b]; ax=pa.x;ay=pa.y;az=pa.z; bx=pb.x;by=pb.y;bz=pb.z; ca=childData[c.a].color; cb=grandData[c.b].color;}

    let boost = 0;
    waves.forEach(w=>{if(Math.abs(Math.hypot(ax,ay,az)-w.r)<2.2) boost+=0.6;});
    const flick = 0.45 + Math.sin(t*2 + i*0.1)*0.15;
    webPos[ptr*3]=ax; webPos[ptr*3+1]=ay; webPos[ptr*3+2]=az;
    webCol[ptr*3]=ca.r*flick+boost; webCol[ptr*3+1]=ca.g*flick+boost; webCol[ptr*3+2]=ca.b*flick+boost;
    ptr++;
    webPos[ptr*3]=bx; webPos[ptr*3+1]=by; webPos[ptr*3+2]=bz;
    webCol[ptr*3]=cb.r*flick+boost; webCol[ptr*3+1]=cb.g*flick+boost; webCol[ptr*3+2]=cb.b*flick+boost;
    ptr++;
  }
  webGeo.attributes.position.needsUpdate=true;
  webGeo.attributes.color.needsUpdate=true;

  // AGENTS pathfinding web
  agents.forEach((ag,idx)=>{
    if(ag.prog>=1 || ag.target===null){
      const neigh = adj[ag.node];
      ag.target = neigh[Math.floor(Math.random()*neigh.length)];
      ag.prog = 0;
    }
    const getPos = n=>{
      if(n===0) return new THREE.Vector3(0,0,0);
      if(n<=96){const p=childPosArr[n-1]; return new THREE.Vector3(p.x,p.y,p.z);}
      const p=grandPosArr[n-97]; return new THREE.Vector3(p.x,p.y,p.z);
    };
    const a = getPos(ag.node), b = getPos(ag.target);
    const dist = a.distanceTo(b);
    ag.prog += dt*ag.speed/dist;
    const pos = a.lerp(b, Math.min(1,ag.prog));
    ag.mesh.position.copy(pos);
    // trail
    for(let i=ag.trailPos.length/3-1;i>0;i--){ag.trailPos[i*3]=ag.trailPos[(i-1)*3];ag.trailPos[i*3+1]=ag.trailPos[(i-1)*3+1];ag.trailPos[i*3+2]=ag.trailPos[(i-1)*3+2];}
    ag.trailPos[0]=pos.x;ag.trailPos[1]=pos.y;ag.trailPos[2]=pos.z;
    ag.trail.geometry.attributes.position.needsUpdate=true;
    if(ag.prog>=1){
      ag.node = ag.target;
      if(ag.node>96){
        const gi = ag.node-97;
        grandBloom[gi]=1;
        // spawn spark
        const spark = new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8), new THREE.MeshBasicMaterial({color:idx?0xff66ff:0x00ffff,transparent:true,opacity:0.9,blending:THREE.AdditiveBlending}));
        spark.position.copy(pos); scene.add(spark);
        let sl=0; const anim=()=>{sl+=dt*3; spark.scale.setScalar(1+sl*2); spark.material.opacity=0.9-sl; if(sl<1)requestAnimationFrame(anim); else scene.remove(spark);}; anim();
      }
    }
  });

  // BEAM INTERACTION
  const beamDir = new THREE.Vector3(Math.sin(beams.rotation.y),0,Math.cos(beams.rotation.y));
  for(let i=0;i<96;i++){
    const p=childPosArr[i];
    const v=new THREE.Vector3(p.x,p.y,p.z).normalize();
    const dot=Math.abs(v.dot(beamDir));
    if(dot>0.985){
      const col = childData[i].color.clone().multiplyScalar(1+dot);
      childInst.setColorAt(i,col);
    }
  }
  childInst.instanceColor.needsUpdate=true;

  // CAMERA DOLLY
  if(t<30){
    const k = 1-Math.pow(1-t/30,3);
    camera.position.set(0,4+18*k,10+58*k);
    controls.target.set(0,0,0);
  } else {
    controls.autoRotate = true;
  }
  controls.update();
  renderer.render(scene,camera);
  requestAnimationFrame(animate);
}
animate();

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
